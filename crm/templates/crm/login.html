{% extends 'base_crm.html' %}

{% block title %}Connexion{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-box-seam display-4 text-serviac"></i>
                        <h4 class="mt-2">SERVIAC GROUP</h4>
                        <p class="text-muted">Connexion au CRM</p>
                    </div>
                    
                    {% if form.errors %}
                    <div class="alert alert-danger">
                        <i class="bi bi-exclamation-circle me-2"></i>
                        Identifiants incorrects. Veuillez réessayer.
                    </div>
                    {% endif %}
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="id_username" class="form-label">Nom d'utilisateur</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" name="username" class="form-control" id="id_username" required autofocus>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label for="id_password" class="form-label">Mot de passe</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" name="password" class="form-control" id="id_password" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-serviac w-100 py-2">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
                        </button>
                    </form>
                </div>
            </div>
            <p class="text-center mt-3">
                <a href="{% url 'website:home' %}" class="text-muted">
                    <i class="bi bi-arrow-left me-1"></i>Retour au site
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
